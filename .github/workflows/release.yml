name: release

# Builds linux/amd64 and linux/arm64 binaries on a version tag, publishes them to
# a GitHub Release alongside checksums.txt, updates repository.json with the tag's
# version + download URLs + per-binary sha256 checksums, and commits that
# regenerated repository.json back to main so the raw-main URL is always valid
# (that URL is what you give Silo's plugin-repository setting).
#
# This workflow is intentionally self-contained and safe to review before its
# first real run: it only publishes on a pushed tag matching v*.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify
        run: |
          test -z "$(gofmt -l .)" || { echo "gofmt needed"; gofmt -l .; exit 1; }
          go vet ./...
          go test ./...

      - name: Resolve version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build binaries
        run: make dist VERSION=${{ steps.version.outputs.version }}

      - name: Checksums
        working-directory: dist
        run: sha256sum silo-plugin-wisp-* > checksums.txt

      - name: Update repository.json
        env:
          VERSION: ${{ steps.version.outputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          amd64_sum="$(sha256sum dist/silo-plugin-wisp-linux-amd64 | cut -d' ' -f1)"
          arm64_sum="$(sha256sum dist/silo-plugin-wisp-linux-arm64 | cut -d' ' -f1)"
          base="https://github.com/${GITHUB_REPOSITORY}/releases/download/${REF_NAME}"
          jq \
            --arg version "$VERSION" \
            --arg checksums_url "${base}/checksums.txt" \
            --arg amd64_url "${base}/silo-plugin-wisp-linux-amd64" \
            --arg arm64_url "${base}/silo-plugin-wisp-linux-arm64" \
            --arg amd64_sum "$amd64_sum" \
            --arg arm64_sum "$arm64_sum" '
              .plugins[0].manifest.version = $version
              | .plugins[0].checksums_url = $checksums_url
              | .plugins[0].binaries["linux/amd64"] = {url: $amd64_url, checksum: $amd64_sum}
              | .plugins[0].binaries["linux/arm64"] = {url: $arm64_url, checksum: $arm64_sum}
            ' repository.json > repository.json.tmp
          mv repository.json.tmp repository.json
          cat repository.json
          # Stash the regenerated file outside the repo so the later branch
          # switch to main can restore it cleanly.
          cp repository.json "$RUNNER_TEMP/repository.json"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/silo-plugin-wisp-linux-amd64
            dist/silo-plugin-wisp-linux-arm64
            dist/checksums.txt
            repository.json

      # Commit the regenerated repository.json back to main so the raw-main URL
      # (https://raw.githubusercontent.com/<owner>/silo-plugin-wisp/main/repository.json)
      # always points at the latest release. [skip ci] avoids retriggering CI.
      - name: Commit repository.json to main
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          # Restore the regenerated file stashed before the branch switch.
          cp "$RUNNER_TEMP/repository.json" repository.json
          if git diff --quiet -- repository.json; then
            echo "repository.json unchanged; nothing to commit"
            exit 0
          fi
          git add repository.json
          git commit -m "chore: sync repository.json for v${VERSION} [skip ci]"
          git push origin main
